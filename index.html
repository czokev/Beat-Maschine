<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktive Symbole</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Beat-Maschine</h1>
        <p>Füge die Symbole ein und kreiere einen coolen Beat!</p>
    </header>

    <main>
    <div class="grid-container">
        <div class="cell header">1</div>
        <div class="cell header">+</div>
        <div class="cell header">2</div>
        <div class="cell header">+</div>
        <div class="cell header">3</div>
        <div class="cell header">+</div>
        <div class="cell header">4</div>
        <div class="cell header">+</div>

        <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="this.innerHTML=''"></div>
        <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="this.innerHTML=''"></div>
        <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="this.innerHTML=''"></div>
        <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="this.innerHTML=''"></div>
        <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="this.innerHTML=''"></div>
        <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="this.innerHTML=''"></div>
        <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="this.innerHTML=''"></div>
        <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="this.innerHTML=''"></div>
    </div>

    <div class="symbol-palette">
        <h3>Ziehe die Symbole in die Quadrate:</h3>
        <div class="palette-inner">
            <img src="schnippen.png" id="sym1" class="selectable-symbol" draggable="true" ondragstart="drag(event)">
            <img src="klopfen.png" id="sym2" class="selectable-symbol" draggable="true" ondragstart="drag(event)">
            <img src="hey.png" id="sym3" class="selectable-symbol" draggable="true" ondragstart="drag(event)">
            <img src="trampeln.png" id="sym3" class="selectable-symbol" draggable="true" ondragstart="drag(event)">
            <img src="ho.png" id="sym3" class="selectable-symbol" draggable="true" ondragstart="drag(event)">
            <img src="klatschen.png" id="sym3" class="selectable-symbol" draggable="true" ondragstart="drag(event)">
            <img src="yeah.png" id="sym3" class="selectable-symbol" draggable="true" ondragstart="drag(event)">
        </div>
    </div>
</main>
<script src="script.js"></script>
</body>
</html>
